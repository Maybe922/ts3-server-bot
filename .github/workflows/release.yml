name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/ts3panel_linux_amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/ts3panel_linux_arm64 .

      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ts3panel_linux_amd64
            dist/ts3panel_linux_arm64
            dist/SHA256SUMS
          generate_release_notes: true
