name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # Bot 原生模块(@discordjs/opus)与 Node ABI 绑定,
      # CI 与 install.sh 必须使用同一大版本: Node 22
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build panel binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/ts3panel_linux_amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/ts3panel_linux_arm64 .

      - name: Build bot bundle (linux amd64)
        run: |
          cd bot
          npm ci --no-audit --no-fund
          npm run build
          npm prune --omit=dev
          mkdir -p ../dist
          tar -czf ../dist/tsmusicbot_linux_amd64.tar.gz dist node_modules package.json

      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ts3panel_linux_amd64
            dist/ts3panel_linux_arm64
            dist/tsmusicbot_linux_amd64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
