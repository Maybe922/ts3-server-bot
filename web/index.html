<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TS3 Panel</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --border: #2a323d;
    --text: #e6edf3;
    --text-dim: #8b98a5;
    --accent: #4a9eff;
    --accent-dim: #2a5f99;
    --ok: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 1rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: min(34rem, 94vw);
  }
  h1 { font-size: 1.25rem; margin-bottom: 0.375rem; }
  h1 span { color: var(--accent); }
  .sub { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 2rem; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 0.75rem 1.5rem; font-size: 0.9375rem; }
  dt { color: var(--text-dim); white-space: nowrap; }
  dd { text-align: right; overflow-wrap: anywhere; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.off { background: var(--text-dim); }
  .actions { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
  button {
    font: inherit; color: #fff; background: var(--accent);
    border: 0; border-radius: 8px; padding: 0.625rem 1.25rem; cursor: pointer;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.secondary:hover { border-color: var(--danger); color: var(--danger); }
  label { display: flex; gap: 0.5rem; align-items: flex-start; font-size: 0.875rem; color: var(--text-dim); }
  label a { color: var(--accent); }
  .creds {
    margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.8125rem;
  }
  .creds h2 { font-size: 0.875rem; margin-bottom: 0.75rem; color: var(--warn); }
  .creds code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg); padding: 0.125rem 0.375rem; border-radius: 4px;
    user-select: all;
  }
  .creds p { margin-bottom: 0.5rem; }
  .msg { font-size: 0.875rem; min-height: 1.25rem; }
  .msg.err { color: var(--danger); }
  .hidden { display: none; }
</style>
</head>
<body>
<main class="card">
  <h1>TS3 <span>Panel</span></h1>
  <p class="sub">TeamSpeak 3 一键部署与管理</p>

  <dl>
    <dt>面板版本</dt><dd id="ver">…</dd>
    <dt>TS3 服务器</dt><dd id="srv">…</dd>
  </dl>

  <div class="actions">
    <div id="install-block" class="hidden">
      <label>
        <input type="checkbox" id="eula">
        <span>我已阅读并同意
          <a href="https://www.teamspeak.com/en/privacy-and-terms/" target="_blank" rel="noopener">TeamSpeak 许可协议</a>
          （安装包内 LICENSE 文件为准）
        </span>
      </label>
      <button id="btn-install" style="margin-top:0.75rem" disabled>下载并安装 TS3 服务器</button>
    </div>
    <button id="btn-start" class="hidden">启动服务器</button>
    <button id="btn-stop" class="secondary hidden">停止服务器</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="creds hidden" id="creds">
    <h2>⚠ 管理凭据（请立即保存，仅此处可见）</h2>
    <p>连接地址：<code id="c-addr">…</code></p>
    <p>管理员密钥 Token：<code id="c-token">…</code></p>
    <p>Query 账号：<code id="c-user">…</code> / <code id="c-pass">…</code></p>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const show = (el, on) => el.classList.toggle('hidden', !on);

async function api(path, body) {
  const opts = body ? { method: 'POST', body: JSON.stringify(body) } : {};
  const res = await fetch(path, opts);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '请求失败');
  return json.data;
}

async function refresh() {
  try {
    const s = await api('/api/status');
    $('ver').textContent = s.panelVersion;
    $('srv').innerHTML = !s.serverInstalled
      ? '<span class="dot warn"></span>未安装'
      : s.serverRunning
        ? '<span class="dot ok"></span>运行中 (v' + s.serverVersion + ')'
        : '<span class="dot off"></span>已停止 (v' + s.serverVersion + ')';
    show($('install-block'), !s.serverInstalled);
    show($('btn-start'), s.serverInstalled && !s.serverRunning);
    show($('btn-stop'), s.serverInstalled && s.serverRunning);
    if (s.credentials) {
      show($('creds'), true);
      $('c-addr').textContent = location.hostname + ':9987';
      $('c-token').textContent = s.credentials.adminToken || '（启动后生成）';
      $('c-user').textContent = s.credentials.queryUser;
      $('c-pass').textContent = s.credentials.queryPassword;
    }
  } catch (e) {
    setMsg('无法连接面板: ' + e.message, true);
  }
}

function setMsg(text, isErr) {
  $('msg').textContent = text;
  $('msg').className = 'msg' + (isErr ? ' err' : '');
}

async function action(btn, path, body, pending) {
  btn.disabled = true;
  setMsg(pending, false);
  try {
    const data = await api(path, body);
    setMsg(data.message || '完成', false);
  } catch (e) {
    setMsg(e.message, true);
  } finally {
    btn.disabled = false;
    refresh();
  }
}

$('eula').onchange = e => { $('btn-install').disabled = !e.target.checked; };
$('btn-install').onclick = () =>
  action($('btn-install'), '/api/server/install', { acceptLicense: $('eula').checked }, '正在从官方源下载安装（约 10MB）…');
$('btn-start').onclick = () => action($('btn-start'), '/api/server/start', {}, '正在启动…');
$('btn-stop').onclick = () => action($('btn-stop'), '/api/server/stop', {}, '正在停止…');

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
