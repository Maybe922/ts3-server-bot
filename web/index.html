<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TS3 Panel</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --border: #2a323d;
    --text: #e6edf3;
    --text-dim: #8b98a5;
    --accent: #4a9eff;
    --ok: #3fb950;
    --warn: #d29922;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: grid;
    place-items: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: min(30rem, 90vw);
  }
  h1 { font-size: 1.25rem; margin-bottom: 0.375rem; }
  h1 span { color: var(--accent); }
  .sub { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 2rem; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 0.75rem 1.5rem; font-size: 0.9375rem; }
  dt { color: var(--text-dim); }
  dd { text-align: right; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
</style>
</head>
<body>
<main class="card">
  <h1>TS3 <span>Panel</span></h1>
  <p class="sub">TeamSpeak 3 一键部署与管理</p>
  <dl>
    <dt>面板版本</dt><dd id="ver">…</dd>
    <dt>面板状态</dt><dd><span class="dot ok"></span>运行中</dd>
    <dt>TS3 服务器</dt><dd id="srv">…</dd>
  </dl>
</main>
<script>
  fetch('/api/status')
    .then(r => r.json())
    .then(s => {
      document.getElementById('ver').textContent = s.panelVersion;
      document.getElementById('srv').innerHTML = s.serverInstalled
        ? '<span class="dot ok"></span>' + (s.serverRunning ? '运行中' : '已停止')
        : '<span class="dot warn"></span>未安装';
    })
    .catch(() => { document.getElementById('srv').textContent = '状态获取失败'; });
</script>
</body>
</html>
