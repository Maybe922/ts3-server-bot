<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TS3 Panel</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --border: #2a323d;
    --text: #e6edf3;
    --text-dim: #8b98a5;
    --accent: #4a9eff;
    --accent-dim: #2a5f99;
    --ok: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 1rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: min(34rem, 94vw);
  }
  #view-main { width: min(44rem, 94vw); }
  section.ops { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  section.ops h2 { font-size: 0.9375rem; margin-bottom: 1rem; color: var(--text-dim); font-weight: 600; }
  .row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.9375rem; gap: 1rem;
  }
  .row:hover { background: var(--bg); }
  .row .meta { color: var(--text-dim); font-size: 0.8125rem; white-space: nowrap; }
  .row .grow { flex: 1; overflow-wrap: anywhere; }
  .row button { padding: 0.25rem 0.75rem; font-size: 0.8125rem; }
  .inline-form { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .inline-form input[type=text] {
    font: inherit; color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.875rem; flex: 1;
  }
  .inline-form input[type=text]:focus { outline: 0; border-color: var(--accent); }
  .stats { display: flex; gap: 2rem; margin-top: 0.75rem; }
  .stat .num { font-size: 1.5rem; font-weight: 700; }
  .stat .lbl { font-size: 0.75rem; color: var(--text-dim); }
  .servername { display: flex; align-items: baseline; gap: 0.75rem; }
  .servername strong { font-size: 1.0625rem; overflow-wrap: anywhere; }
  .empty { color: var(--text-dim); font-size: 0.875rem; padding: 0.5rem 0.75rem; }
  h1 { font-size: 1.25rem; margin-bottom: 0.375rem; }
  h1 span { color: var(--accent); }
  .sub { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 2rem; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 0.75rem 1.5rem; font-size: 0.9375rem; }
  dt { color: var(--text-dim); white-space: nowrap; }
  dd { text-align: right; overflow-wrap: anywhere; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.off { background: var(--text-dim); }
  .actions { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
  button {
    font: inherit; color: #fff; background: var(--accent);
    border: 0; border-radius: 8px; padding: 0.625rem 1.25rem; cursor: pointer;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.secondary:hover { border-color: var(--danger); color: var(--danger); }
  button.ghost { background: transparent; border: 0; color: var(--text-dim); font-size: 0.8125rem; padding: 0.25rem; }
  button.ghost:hover { color: var(--text); background: transparent; }
  input[type=password] {
    font: inherit; color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 0.625rem 0.875rem; width: 100%;
  }
  input[type=password]:focus { outline: 0; border-color: var(--accent); }
  label { display: flex; gap: 0.5rem; align-items: flex-start; font-size: 0.875rem; color: var(--text-dim); }
  label a { color: var(--accent); }
  .creds {
    margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.8125rem;
  }
  .creds h2 { font-size: 0.875rem; margin-bottom: 0.75rem; color: var(--warn); }
  .creds code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg); padding: 0.125rem 0.375rem; border-radius: 4px;
    user-select: all;
  }
  .creds p { margin-bottom: 0.5rem; }
  .msg { font-size: 0.875rem; min-height: 1.25rem; }
  .msg.err { color: var(--danger); }
  .hidden { display: none; }
  .form { display: flex; flex-direction: column; gap: 0.875rem; }
  .topbar { display: flex; justify-content: space-between; align-items: baseline; }
</style>
</head>
<body>

<!-- 首次使用：设置管理密码 -->
<main class="card hidden" id="view-setup">
  <h1>TS3 <span>Panel</span></h1>
  <p class="sub">欢迎！首次使用请设置面板管理密码</p>
  <div class="form">
    <input type="password" id="setup-pw" placeholder="设置密码（至少 8 位）" autocomplete="new-password">
    <input type="password" id="setup-pw2" placeholder="再输入一次" autocomplete="new-password">
    <button id="btn-setup">设置并进入面板</button>
    <p class="msg" id="setup-msg"></p>
  </div>
</main>

<!-- 登录 -->
<main class="card hidden" id="view-login">
  <h1>TS3 <span>Panel</span></h1>
  <p class="sub">请输入面板管理密码</p>
  <div class="form">
    <input type="password" id="login-pw" placeholder="密码" autocomplete="current-password">
    <button id="btn-login">登录</button>
    <p class="msg" id="login-msg"></p>
  </div>
</main>

<!-- 主面板 -->
<main class="card hidden" id="view-main">
  <div class="topbar">
    <h1>TS3 <span>Panel</span></h1>
    <button class="ghost" id="btn-logout">退出登录</button>
  </div>
  <p class="sub">TeamSpeak 3 一键部署与管理</p>

  <dl>
    <dt>面板版本</dt><dd id="ver">…</dd>
    <dt>TS3 服务器</dt><dd id="srv">…</dd>
  </dl>

  <div class="actions">
    <div id="install-block" class="hidden">
      <label>
        <input type="checkbox" id="eula">
        <span>我已阅读并同意
          <a href="https://www.teamspeak.com/en/privacy-and-terms/" target="_blank" rel="noopener">TeamSpeak 许可协议</a>
          （安装包内 LICENSE 文件为准）
        </span>
      </label>
      <button id="btn-install" style="margin-top:0.75rem" disabled>下载并安装 TS3 服务器</button>
    </div>
    <button id="btn-start" class="hidden">启动服务器</button>
    <button id="btn-stop" class="secondary hidden">停止服务器</button>
    <p class="msg" id="msg"></p>
  </div>

  <!-- 运维区：仅服务器运行中显示 -->
  <section class="ops hidden" id="ops-overview">
    <h2>服务器概览</h2>
    <div class="servername">
      <strong id="ov-name">…</strong>
      <button class="ghost" id="btn-rename">改名</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="ov-online">-</div><div class="lbl">在线人数</div></div>
      <div class="stat"><div class="num" id="ov-max">-</div><div class="lbl">人数上限</div></div>
      <div class="stat"><div class="num" id="ov-uptime">-</div><div class="lbl">运行时间</div></div>
    </div>
  </section>

  <section class="ops hidden" id="ops-channels">
    <h2>频道</h2>
    <div id="channel-list"></div>
    <div class="inline-form">
      <input type="text" id="new-channel" placeholder="新频道名称" maxlength="40">
      <button id="btn-add-channel">创建</button>
    </div>
  </section>

  <section class="ops hidden" id="ops-clients">
    <h2>在线用户</h2>
    <div id="client-list"></div>
  </section>

  <div class="creds hidden" id="creds">
    <h2>⚠ 管理凭据（请妥善保存）</h2>
    <p>连接地址：<code id="c-addr">…</code></p>
    <p>管理员密钥 Token：<code id="c-token">…</code></p>
    <p>Query 账号：<code id="c-user">…</code> / <code id="c-pass">…</code></p>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const show = (el, on) => el.classList.toggle('hidden', !on);
const views = ['view-setup', 'view-login', 'view-main'];
let pollTimer = null;

function switchView(id) {
  views.forEach(v => show($(v), v === id));
  clearInterval(pollTimer);
  if (id === 'view-main') {
    refresh();
    pollTimer = setInterval(refresh, 5000);
  }
}

async function api(path, body) {
  const opts = body ? { method: 'POST', body: JSON.stringify(body) } : {};
  const res = await fetch(path, opts);
  if (res.status === 401) { boot(); throw new Error('未登录'); }
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '请求失败');
  return json.data;
}

async function boot() {
  try {
    const s = await api('/api/auth/state');
    switchView(!s.passwordSet ? 'view-setup' : s.loggedIn ? 'view-main' : 'view-login');
  } catch {
    setMsg($('login-msg'), '无法连接面板', true);
    switchView('view-login');
  }
}

function setMsg(el, text, isErr) {
  el.textContent = text;
  el.className = 'msg' + (isErr ? ' err' : '');
}

async function refresh() {
  try {
    const s = await api('/api/status');
    $('ver').textContent = s.panelVersion;
    $('srv').innerHTML = !s.serverInstalled
      ? '<span class="dot warn"></span>未安装'
      : s.serverRunning
        ? '<span class="dot ok"></span>运行中 (v' + s.serverVersion + ')'
        : '<span class="dot off"></span>已停止 (v' + s.serverVersion + ')';
    show($('install-block'), !s.serverInstalled);
    show($('btn-start'), s.serverInstalled && !s.serverRunning);
    show($('btn-stop'), s.serverInstalled && s.serverRunning);
    if (s.credentials) {
      show($('creds'), true);
      $('c-addr').textContent = location.hostname + ':9987';
      $('c-token').textContent = s.credentials.adminToken || '（启动后生成）';
      $('c-user').textContent = s.credentials.queryUser;
      $('c-pass').textContent = s.credentials.queryPassword;
    }
    ['ops-overview', 'ops-channels', 'ops-clients'].forEach(id => show($(id), s.serverRunning));
    if (s.serverRunning) refreshOps();
  } catch (e) {
    if (e.message !== '未登录') setMsg($('msg'), e.message, true);
  }
}

function fmtUptime(sec) {
  if (sec < 3600) return Math.floor(sec / 60) + ' 分钟';
  if (sec < 86400) return (sec / 3600).toFixed(1) + ' 小时';
  return (sec / 86400).toFixed(1) + ' 天';
}

// textContent 赋值，杜绝把服务器返回的名字当 HTML 解析
function renderRows(container, items, render) {
  container.replaceChildren();
  if (!items.length) {
    const div = document.createElement('div');
    div.className = 'empty';
    div.textContent = container.id === 'client-list' ? '当前没有人在线' : '暂无频道';
    container.appendChild(div);
    return;
  }
  items.forEach(item => container.appendChild(render(item)));
}

function makeRow(name, meta, btnText, onClick) {
  const row = document.createElement('div');
  row.className = 'row';
  const grow = document.createElement('span');
  grow.className = 'grow';
  grow.textContent = name;
  const metaEl = document.createElement('span');
  metaEl.className = 'meta';
  metaEl.textContent = meta;
  const btn = document.createElement('button');
  btn.className = 'secondary';
  btn.textContent = btnText;
  btn.onclick = onClick;
  row.append(grow, metaEl, btn);
  return row;
}

async function refreshOps() {
  try {
    const [ov, channels, clients] = await Promise.all([
      api('/api/ts/overview'), api('/api/ts/channels'), api('/api/ts/clients'),
    ]);
    $('ov-name').textContent = ov.name;
    $('ov-online').textContent = ov.clientsOnline;
    $('ov-max').textContent = ov.maxClients;
    $('ov-uptime').textContent = fmtUptime(ov.uptimeSeconds);

    renderRows($('channel-list'), channels, ch =>
      makeRow(ch.name, ch.clients + ' 人', '删除', async () => {
        if (!confirm('删除频道「' + ch.name + '」？')) return;
        try { await api('/api/ts/channels/delete', { channelId: ch.id }); refreshOps(); }
        catch (e) { setMsg($('msg'), e.message, true); }
      }));

    renderRows($('client-list'), clients, c =>
      makeRow(c.nickname, 'ID ' + c.id, '踢出', async () => {
        if (!confirm('把「' + c.nickname + '」踢出服务器？')) return;
        try { await api('/api/ts/kick', { clientId: c.id, reason: '管理员操作' }); refreshOps(); }
        catch (e) { setMsg($('msg'), e.message, true); }
      }));
  } catch (e) {
    if (e.message !== '未登录') setMsg($('msg'), e.message, true);
  }
}

$('btn-rename').onclick = async () => {
  const name = prompt('新的服务器名称：', $('ov-name').textContent);
  if (!name) return;
  try { await api('/api/ts/rename', { name }); refreshOps(); }
  catch (e) { setMsg($('msg'), e.message, true); }
};

$('btn-add-channel').onclick = async () => {
  const name = $('new-channel').value.trim();
  if (!name) return;
  try {
    await api('/api/ts/channels/create', { name });
    $('new-channel').value = '';
    refreshOps();
  } catch (e) { setMsg($('msg'), e.message, true); }
};
$('new-channel').onkeydown = e => { if (e.key === 'Enter') $('btn-add-channel').click(); };

async function action(btn, path, body, pending) {
  btn.disabled = true;
  setMsg($('msg'), pending, false);
  try {
    const data = await api(path, body);
    setMsg($('msg'), data.message || '完成', false);
  } catch (e) {
    setMsg($('msg'), e.message, true);
  } finally {
    btn.disabled = false;
    refresh();
  }
}

$('btn-setup').onclick = async () => {
  const pw = $('setup-pw').value, pw2 = $('setup-pw2').value;
  if (pw !== pw2) return setMsg($('setup-msg'), '两次输入不一致', true);
  try {
    await api('/api/auth/setup', { password: pw });
    switchView('view-main');
  } catch (e) {
    setMsg($('setup-msg'), e.message, true);
  }
};

$('btn-login').onclick = async () => {
  try {
    await api('/api/auth/login', { password: $('login-pw').value });
    switchView('view-main');
  } catch (e) {
    setMsg($('login-msg'), e.message, true);
  }
};
$('login-pw').onkeydown = e => { if (e.key === 'Enter') $('btn-login').click(); };

$('btn-logout').onclick = async () => {
  await api('/api/auth/logout', {}).catch(() => {});
  switchView('view-login');
};

$('eula').onchange = e => { $('btn-install').disabled = !e.target.checked; };
$('btn-install').onclick = () =>
  action($('btn-install'), '/api/server/install', { acceptLicense: $('eula').checked }, '正在从官方源下载安装（约 10MB）…');
$('btn-start').onclick = () => action($('btn-start'), '/api/server/start', {}, '正在启动…');
$('btn-stop').onclick = () => action($('btn-stop'), '/api/server/stop', {}, '正在停止…');

boot();
</script>
</body>
</html>
